# Example configuration for a 3-monitor system with workspace-aware layouts.
#
# Each monitor needs its own launcher instance with its own config file.
# Use this file as a template and create three copies:
#
#   config-monitor0.toml  → monitor = 0
#   config-monitor1.toml  → monitor = 1
#   config-monitor2.toml  → monitor = 2
#
# Launch with:
#   smearor-swipe-launcher --config config-monitor0.toml --config config-monitor1.toml --config config-monitor2.toml \
#     --instance monitor0 --instance monitor1 --instance monitor2
#
# Workspace tracking requires enabling it in the Hyprland service config:
#
#   [[services]]
#   id = "hyprland"
#   path = "target/release/libsmearor_hyprland_service.so"
#
#   [hyprland]
#   enable_workspace_tracking = true

areas = ["main"]

[launcher]
rotation = 0

[launcher.layer]
layer = "top"
namespace = "smearor-bottom"
exclusive_zone = 50
monitor = 0

[layout]
orientation = "horizontal"
spacing = 0

# --- Layout profiles ---
#
# Profiles are evaluated in declaration order. The first matching profile wins.
# When no profile matches, the default layout (areas = ["main"]) is used.
#
# Available triggers:
#   { monitor_index = 0 }                          — match by GDK monitor index
#   { monitor = "DP-1" }                           — match by connector name
#   { workspace = 2 }                              — match by workspace ID (any monitor)
#   { monitor_index = 0, workspace = 2 }           — match by index + workspace
#   { monitor = "DP-1", workspace = 2 }            — match by name + workspace
#   "Default"                                      — always matches (fallback)

# --- Workspace-specific layouts for monitor 0 ---

# Monitor 0, workspace 2: media controls only
[[profiles]]
trigger = { monitor_index = 0, workspace = 2 }
areas = ["media_left", "media_scroll", "media_right"]

# Monitor 0, workspace 3: system info layout
[[profiles]]
trigger = { monitor_index = 0, workspace = 3 }
areas = ["sysinfo_left", "sysinfo_scroll"]

# --- Monitor-specific layouts (fallback when workspace doesn't match) ---

# Layout for monitor 0 (primary): clock + app launcher + clock
[[profiles]]
trigger = { monitor_index = 0 }
areas = ["left", "scroll", "right"]

# Layout for monitor 1 (secondary): app launcher only
[[profiles]]
trigger = { monitor_index = 1 }
areas = ["scroll"]

# Layout for monitor 2 (tertiary): clock + app launcher
[[profiles]]
trigger = { monitor_index = 2 }
areas = ["left", "scroll"]

# --- Default areas (fallback when no profile matches) ---

[main]
area_type = "scroll"
plugins = [
    { id = "app_launcher_main", path = "target/release/libsmearor_app_launcher_widget.so" },
]

# --- Areas for monitor 0 default profile ---

[left]
area_type = "fixed"
width = 200
plugins = [
    { id = "clock_left", path = "target/release/libsmearor_clock_widget.so" },
]

[scroll]
area_type = "scroll"
plugins = [
    { id = "app_launcher", path = "target/release/libsmearor_app_launcher_widget.so" },
]

[right]
area_type = "fixed"
width = 200
plugins = [
    { id = "clock_right", path = "target/release/libsmearor_clock_widget.so" },
]

# --- Areas for workspace 2 (media) on monitor 0 ---

[media_left]
area_type = "fixed"
width = 200
plugins = [
    { id = "mpris_media", path = "target/release/libsmearor_mpris_widget.so" },
]

[media_scroll]
area_type = "scroll"
plugins = [
    { id = "app_launcher_media", path = "target/release/libsmearor_app_launcher_widget.so" },
]

[media_right]
area_type = "fixed"
width = 200
plugins = [
    { id = "audio_media", path = "target/release/libsmearor_audio_widget.so" },
]

# --- Areas for workspace 3 (system info) on monitor 0 ---

[sysinfo_left]
area_type = "fixed"
width = 200
plugins = [
    { id = "sysinfo_left", path = "target/release/libsmearor_sysinfo_widget.so" },
]

[sysinfo_scroll]
area_type = "scroll"
plugins = [
    { id = "app_launcher_sysinfo", path = "target/release/libsmearor_app_launcher_widget.so" },
]

# --- Plugin configs ---

[clock_left]
format = "%H:%M"

[clock_right]
format = "%H:%M"
