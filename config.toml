[cpu_widget]
widget = "cpu"
display_mode = "Gauge"
bar_orientation = "Horizontal"
show_value = true
show_icon = true
show_temperature = true
icon = "nf-md-cpu_64_bit"
value_format = "{cpu_usage:.0}%"
warning_threshold = 70.0
critical_threshold = 90.0

[memory_widget]
widget = "memory"
display_mode = "Gauge"
#display_mode = "Bar"
bar_orientation = "Vertical"
show_value = true
show_icon = true
show_used_bytes = true
show_available_bytes = false
icon = "nf-md-memory"
value_format = "{memory_usage:.0}%"
warning_threshold = 75.0
critical_threshold = 90.0

[battery_widget]
widget = "battery"
display_mode = "Gauge"
#display_mode = "Bar"
show_value = true
show_icon = true
show_status_text = true
icon = "nf-md-battery"
value_format = "{level:.0}%"
warning_threshold = 20.0
critical_threshold = 10.0

[disks_widget]
widget = "disks"
max_mount_points = 3
include_mount_points = ["/"]
show_throughput = true
#display_mode = "RootOnly"
display_mode = "Gauge"  # Shows a circular gauge for the first matching mount point
icon = "nf-md-harddisk"

[network_widget]
widget = "network"
display_mode = "Gauge"
show_received = true
show_transmitted = true
# Maximum bandwidth in bytes per second (50 Mbit down / 16 Mbit up)
max_download = 6250000
max_upload = 2000000
icon = "nf-md-network"


[uptime_widget]
widget = "uptime"
display_mode = "Gauge"
value_format = "{hours}:{minutes}h"
show_uptime = true
show_load_average_1_minute = false
show_load_average_5_minute = false
show_load_average_15_minute = false
icon = "nf-md-clock_start"

[weather_widget]
width = 120
height = 80
# views = ["Current", "ForecastToday", "Wind", "Humidity"]
views = ["Current", "ForecastToday", "ForecastTomorrow", "Wind", "Humidity", "SunriseSunset", "AirPollution", "Pressure", "UvIndex"]
click_topic = "service.app_launcher.command"
click_payload = { desktop_file = "/var/lib/flatpak/exports/share/applications/io.github.amit9838.mousam.desktop", action = "Exec" }

[power_widget]
width = 100
default_action = "lock"
show_shutdown = false
show_reboot = true
show_suspend = true
show_hibernate = true
show_lock = true
show_logout = false
show_reboot_to_firmware = false
show_inhibitor_warnings = false
show_countdown_overlay = true
show_scheduled_status = true
button_size = 48
icon_size = 36
longpress_topic = "area.open"
longpress_payload = { area_id = "power_area" }

[wallpaper_widget]
width = 120
height = 120
show_theme_name = true
show_type_icon = true
show_status_indicator = true
preview_width = 100
preview_height = 100
fallback_icon = "nf-md-wallpaper"
#click_topic = "area.open"
#click_payload = { area_id = "wallpaper_area" }


[network_menu_widget]
width = 300
height = 400
spacing = 8
show_status = true
show_scan_list = true
show_airplane_toggle = true
show_vpn_toggles = true
show_throughput = true
show_qr_code = true
button_size = 48
icon_size = 36
max_access_points = 10
click_topic = "area.open"
click_payload = { area_id = "network_area" }


