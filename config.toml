# smearor-swipe-launcher Configuration

### Define the layout order

areas = ["left_area", "scroll_band", "right_area"]

# Global default templates for plugin configs.
# Individual plugins reference a template with: defaults = "template_name"
# Instance-specific values always override the template values.

[defaults.menu_button]
icon_only = true
click_topic = "area.open"
longpress_topic = "area.close"
enabled = true
active = false
css_classes = ["menu-button", "glow-blue"]

[defaults.close_button]
text = ""
icon = "window-close-symbolic"
icon_only = true
click_topic = "area.close"
enabled = true
active = false
css_classes = ["close-button"]

[defaults.app_launcher]
icon_only = true

### Configure the app launcher service

[app_launcher]
smearor_wrot_path = "smearor-wrot"
rotation = 0

### Configure the application global settings

[launcher]
# Initial rotation in degrees (0, 90, 180, 270)
rotation = 0
layer = "top"
namespace = "smearor-swipe-launcher"
exclusive_zone = 150

[layout]
orientation = "horizontal"
#orientation = "vertical"
spacing = 0

### Plugins in the left static area

[left_area]
area_type = "fixed"
width = 300
plugins = [
    { id = "clock_widget", path = "target/release/libsmearor_clock_widget.so" }
]

[clock_widget]
format = "[hour]:[minute]:[second]"
format_2 = "[day].[month].[year]"
timezone = "local"
click_topic = "area.open"
click_payload = { area_id = "clock_area" }
longpress_topic = "area.close"
longpress_payload = { area_id = "clock_area" }

# Plugins in the center scroll band
[scroll_band]
area_type = "scroll"
plugins = [
    { id = "games_menu_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "tools_menu_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "video_menu_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "music_menu_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "web_menu_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "audio", path = "target/release/libsmearor_audio_widget.so" },
    { id = "mpris", path = "target/release/libsmearor_mpris_widget.so" },
    { id = "nonexistent", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "nautilus", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "wike", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "loupe", path = "target/release/libsmearor_app_launcher_widget.so" }
    #    { id = "gnome_settings", path = "target/release/libsmearor_app_launcher_widget.so" },
]

# Plugins in the right static area
[right_area]
area_type = "fixed"
width = 300
plugins = [
    #    { id = "notifications", path = "target/release/libsmearor_notifications_widget.so" },
    { id = "close_launcher", path = "target/release/libsmearor_button_widget.so" }
]

[close_launcher]
defaults = "close_button"
text = "✕"
tooltip = "Exit"
click_topic = "core.close"
click_payload = { }

# Plugin-specific configurations

[nonexistent]
desktop_file_path = "/usr/share/applications/nonexistent.desktop"

[nautilus]
defaults = "app_launcher"
desktop_file_path = "/usr/share/applications/org.gnome.Nautilus.desktop"
[nautilus.wrapper]
follows_rotation = true

[loupe]
defaults = "app_launcher"
desktop_file_path = "/usr/share/applications/org.gnome.Loupe.desktop"
[loupe.wrapper]
follows_rotation = true
#auto_color_mask = true
#rotation = 270
#layer = "background"
#namespace = "gnome-mines"

[wike]
defaults = "app_launcher"
desktop_file_path = "/usr/share/applications/com.github.hugolabe.Wike.desktop"
[wike.wrapper]
