# smearor-swipe-launcher Configuration

# Define the layout order
areas = ["left_area", "scroll_band", "right_area"]

# Services to load
[[services]]
id = "app_launcher"
path = "target/release/libsmearor_app_launcher_service.so"

[launcher]
# Initial rotation in degrees (0, 90, 180, 270)
rotation = 0

[layout]
orientation = "horizontal"
#orientation = "vertical"
spacing = 0

# Plugins in the left static area
[left_area]
area_type = "fixed"
width = 200
plugins = [
    { id = "clock_widget", path = "target/release/libsmearor_clock_widget.so" }
]

[clock_widget]
format = "[hour]:[minute]:[second]"
format_2 = "[day].[month].[year]"
timezone = "local"
click_topic = "area.open"
click_payload = { area_id = "clock_area" }
longpress_topic = "area.close"
longpress_payload = { area_id = "clock_area" }

# Plugins in the center scroll band
[scroll_band]
area_type = "scroll"
plugins = [
    { id = "games_menu_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "tools_menu_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "nonexistent", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "firefox_nightly", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "nautilus", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "epiphany", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "loupe", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "totem", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "gnome_settings", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "smearor_wrot_gnome_2048", path = "target/release/libsmearor_app_launcher_widget.so" }
]

# Plugins in the right static area
[right_area]
area_type = "fixed"
width = 200
plugins = [
    { id = "clock_widget_right", path = "target/release/libsmearor_clock_widget.so" }
]

[clock_widget_right]
format = "[hour]:[minute]:[second]"
timezone = "UTC"

# Plugin-specific configurations

[nonexistent]
desktop_file_path = "/usr/share/applications/nonexistent.desktop"

[firefox_nightly]
desktop_file_path = "/usr/share/applications/firefox-nightly.desktop"

[nautilus]
desktop_file_path = "/usr/share/applications/org.gnome.Nautilus.desktop"

[epiphany]
desktop_file_path = "/usr/share/applications/org.gnome.Epiphany.desktop"

[loupe]
desktop_file_path = "/usr/share/applications/org.gnome.Loupe.desktop"

[totem]
desktop_file_path = "/usr/share/applications/org.gnome.Totem.desktop"

[gnome_settings]
desktop_file_path = "/usr/share/applications/org.gnome.Settings.desktop"

[smearor_wrot_gnome_2048]
desktop_file_path = "/home/aschaeffer/.local/share/applications/io.smearor.wrot.org.gnome.TwentyFortyEight.desktop"



# Button widget configuration
[games_menu_button]
text = "Games"
icon = "applications-games-symbolic"
tooltip = "Open games menu"
icon_only = false
click_topic = "area.open"
click_payload = { area_id = "games_area" }
longpress_topic = "area.close"
longpress_payload = { area_id = "games_area" }
enabled = true
active = false
css_classes = ["menu-button", "primary"]

# Games submenu area configuration
[games_area]
area_type = "scroll"
transition = "SlideLeft"
plugins = [
    { id = "games_close_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "puzzle_games_menu_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "board_games_menu_button", path = "target/release/libsmearor_button_widget.so" }
]

# Close button configuration
[games_close_button]
text = "✕"
icon = "window-close-symbolic"
tooltip = "Close games menu"
icon_only = true
click_topic = "area.close"
click_payload = { area_id = "games_area" }
enabled = true
active = false
css_classes = ["close-button"]



[puzzle_games_menu_button]
