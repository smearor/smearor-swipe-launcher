# smearor-swipe-launcher Configuration

### Define the layout order

areas = ["left_area", "scroll_band", "right_area"]

# Global default templates for plugin configs.
# Individual plugins reference a template with: defaults = "template_name"
# Instance-specific values always override the template values.

[defaults.menu_button]
icon_only = true
click_topic = "area.open"
longpress_topic = "area.close"
enabled = true
active = false
css_classes = ["menu-button", "glow-blue"]

[defaults.close_button]
text = ""
icon = "nf-md-undo"
icon_only = true
click_topic = "area.close"
enabled = true
active = false
css_classes = ["close-button"]

[defaults.app_launcher]
icon_only = true

### Configure the app launcher service

[app_launcher]
smearor_wrot_path = "smearor-wrot"
rotation = 0

#### Configure the sysinfo service
#
#[sysinfo]
#update_interval_ms = 1000
#enable_cpu_temperature = true
#enable_battery = true
#enable_disks = true
#enable_network = true

### Configure the application global settings

[launcher]
# Initial rotation in degrees (0, 90, 180, 270)
rotation = 0
layer = "top"
namespace = "smearor-swipe-launcher"
exclusive_zone = 150

[layout]
orientation = "horizontal"
#orientation = "vertical"
spacing = 0

### Plugins in the left static area

[left_area]
area_type = "fixed"
width = 200
align = "right"
plugins = [
    { id = "clock_widget", path = "target/release/libsmearor_clock_widget.so" }
]

[clock_widget]
format = "[hour]:[minute]:[second]"
format_2 = "[day].[month].[year]"
timezone = "local"
click_topic = "area.open"
click_payload = { area_id = "clock_area" }
longpress_topic = "area.close"
longpress_payload = { area_id = "clock_area" }

# Plugins in the center scroll band
[scroll_band]
area_type = "scroll"
spacing = 0
plugins = [
    { id = "previous_workspace", path = "target/release/libsmearor_button_widget.so" },
    { id = "toggle_floating", path = "target/release/libsmearor_button_widget.so" },
    { id = "close_active_window", path = "target/release/libsmearor_button_widget.so" },
    { id = "toggle_fullscreen", path = "target/release/libsmearor_button_widget.so" },
    { id = "games_menu_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "tools_menu_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "video_menu_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "music_menu_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "web_menu_button", path = "target/release/libsmearor_button_widget.so" },
    { id = "audio", path = "target/release/libsmearor_audio_widget.so" },
    { id = "mpris", path = "target/release/libsmearor_mpris_widget.so" },
    { id = "nonexistent", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "nautilus", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "wike", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "loupe", path = "target/release/libsmearor_app_launcher_widget.so" },
    { id = "cpu_widget", path = "target/release/libsmearor_sysinfo_widget.so", widget = "cpu" },
    { id = "memory_widget", path = "target/release/libsmearor_sysinfo_widget.so", widget = "memory" },
    { id = "battery_widget", path = "target/release/libsmearor_sysinfo_widget.so", widget = "battery" },
    { id = "disks_widget", path = "target/release/libsmearor_sysinfo_widget.so", widget = "disks" },
    { id = "network_widget", path = "target/release/libsmearor_sysinfo_widget.so", widget = "network" },
    { id = "uptime_widget", path = "target/release/libsmearor_sysinfo_widget.so", widget = "uptime" },
    { id = "next_workspace", path = "target/release/libsmearor_button_widget.so" },
    #    { id = "gnome_settings", path = "target/release/libsmearor_app_launcher_widget.so" },
]

[previous_workspace]
defaults = "menu_button"
text = "Previous Workspace"
icon = "nf-md-skip_previous"
icon_size = 36
tooltip = "Previous Workspace"
click_topic = "service.hyprland.dispatch"
click_payload = { kind = "Workspace", identifier = { kind = "Relative", id = -1 } }
longpress_topic = "service.hyprland.dispatch"
longpress_payload = { kind = "MoveToWorkspace", identifier = { kind = "RelativeOpen", id = -1 } }

[next_workspace]
defaults = "menu_button"
text = "Next Workspace"
icon = "nf-md-skip_next"
icon_size = 36
tooltip = "Next Workspace"
click_topic = "service.hyprland.dispatch"
click_payload = { kind = "Workspace", identifier = { kind = "Relative", id = 1 } }
longpress_topic = "service.hyprland.dispatch"
longpress_payload = { kind = "MoveToWorkspace", identifier = { kind = "RelativeOpen", id = 1 } }

[toggle_floating]
defaults = "menu_button"
text = "Toggle Floating"
icon = "nf-md-window_restore"
icon_size = 36
tooltip = "Toggle Floating"
click_topic = "service.hyprland.dispatch"
click_payload = { kind = "ToggleFloating" }

[close_active_window]
defaults = "menu_button"
text = "Close"
icon = "nf-md-window_close"
icon_size = 36
tooltip = "Close Active Window"
click_topic = "service.hyprland.dispatch"
click_payload = { kind = "KillActiveWindow" }

[toggle_fullscreen]
defaults = "menu_button"
text = "Fullscreen"
icon = "nf-md-fullscreen"
icon_size = 36
tooltip = "Toggle Fullscreen"
click_topic = "service.hyprland.dispatch"
click_payload = { kind = "ToggleFullscreen", fullscreen_type = "Maximize" }
longpress_topic = "service.hyprland.dispatch"
longpress_payload = { kind = "ToggleFullscreen", fullscreen_type = "Real" }

[mpris]
max_width_chars = 24
spacing = 10

[audio]
max_width_chars = 24
spacing = 10

# Plugins in the right static area
[right_area]
area_type = "fixed"
width = 200
align = "left"
plugins = [
    #    { id = "notifications", path = "target/release/libsmearor_notifications_widget.so" },
    { id = "close_launcher", path = "target/release/libsmearor_button_widget.so" }
]

[close_launcher]
defaults = "close_button"
text = "✕"
icon = "nf-md-exit_to_app"
tooltip = "Exit"
click_topic = "core.close"
click_payload = { }

