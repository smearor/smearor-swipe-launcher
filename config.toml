# smearor-swipe-launcher Configuration

# Define the layout order
areas = ["left_area", "scroll_band", "right_area"]

# Services to load
[[services]]
id = "app_launcher"
path = "target/debug/libsmearor_app_launcher_service.so"

[launcher]
# Initial rotation in degrees (0, 90, 180, 270)
rotation = 0

[layout]
orientation = "horizontal"
spacing = 0

# Plugins in the left static area
[left_area]
area_type = "fixed"
width = 200
plugins = [
    { id = "clock_widget_left", path = "target/debug/libsmearor_clock_widget.so" },
    { id = "games_button", path = "target/debug/libsmearor_button_widget.so" }
]

# Plugins in the center scroll band
[scroll_band]
area_type = "scroll"
plugins = [
    { id = "clock_widget_date", path = "target/debug/libsmearor_clock_widget.so" },
    { id = "clock_widget_time", path = "target/debug/libsmearor_clock_widget.so" },
    { id = "firefox_nightly", path = "target/debug/libsmearor_app_launcher_widget.so" },
    { id = "gnome_calculator", path = "target/debug/libsmearor_app_launcher_widget.so" },
    { id = "nautilus", path = "target/debug/libsmearor_app_launcher_widget.so" },
    { id = "epiphany", path = "target/debug/libsmearor_app_launcher_widget.so" },
    { id = "loupe", path = "target/debug/libsmearor_app_launcher_widget.so" },
    { id = "totem", path = "target/debug/libsmearor_app_launcher_widget.so" },
    { id = "gnome_settings", path = "target/debug/libsmearor_app_launcher_widget.so" },
    { id = "smearor_wrot_gnome_2048", path = "target/debug/libsmearor_app_launcher_widget.so" }
]

# Plugins in the right static area
[right_area]
area_type = "fixed"
width = 200
plugins = [
    { id = "clock_widget_right", path = "target/debug/libsmearor_clock_widget.so" }
]

# Plugin-specific configurations

[firefox_nightly]
desktop_file_path = "/usr/share/applications/firefox-nightly.desktop"

[gnome_2048]
desktop_file_path = "/usr/share/applications/org.gnome.TwentyFortyEight.desktop"

[gnome_chess]
desktop_file_path = "/usr/share/applications/org.gnome.Chess.desktop"

[gnome_mines]
desktop_file_path = "/usr/share/applications/org.gnome.Mines.desktop"

[gnome_calculator]
desktop_file_path = "/usr/share/applications/org.gnome.Calculator.desktop"
follows_rotation = true

[nautilus]
desktop_file_path = "/usr/share/applications/org.gnome.Nautilus.desktop"

[epiphany]
desktop_file_path = "/usr/share/applications/org.gnome.Epiphany.desktop"

[loupe]
desktop_file_path = "/usr/share/applications/org.gnome.Loupe.desktop"

[totem]
desktop_file_path = "/usr/share/applications/org.gnome.Totem.desktop"

[gnome_settings]
desktop_file_path = "/usr/share/applications/org.gnome.Settings.desktop"

[smearor_wrot_gnome_2048]
desktop_file_path = "/home/aschaeffer/.local/share/applications/io.smearor.wrot.org.gnome.TwentyFortyEight.desktop"

[clock_widget_left]
format = "[hour]:[minute]:[second]"
timezone = "UTC"

[clock_widget_date]
format = "[year]-[month]-[day]"
timezone = "UTC"

[clock_widget_time]
format = "[hour]:[minute]:[second]"
timezone = "UTC"

[clock_widget_right]
format = "[hour]:[minute]:[second]"
timezone = "UTC"

# Button widget configuration
[games_button]
text = "Games"
icon = "applications-games"
tooltip = "Open games menu"
icon_only = false
click_topic = "area.open"
click_payload = { area_id = "games_area" }
longpress_topic = "area.close"
longpress_payload = { area_id = "games_area" }
enabled = true
active = false
css_classes = ["menu-button", "primary"]

# Games submenu area configuration
[games_area]
area_type = "scroll"
transition = "SlideLeft"
plugins = [
    { id = "close_games", path = "target/debug/libsmearor_button_widget.so" },
    { id = "gnome_2048", path = "target/debug/libsmearor_app_launcher_widget.so" },
    { id = "gnome_mines", path = "target/debug/libsmearor_app_launcher_widget.so" },
    { id = "gnome_chess", path = "target/debug/libsmearor_app_launcher_widget.so" }
]

# Close button configuration
[close_games]
text = "✕"
icon = "window-close"
tooltip = "Close games menu"
icon_only = true
click_topic = "area.close"
click_payload = { area_id = "games_area" }
enabled = true
active = false
css_classes = ["close-button"]
