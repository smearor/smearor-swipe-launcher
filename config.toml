[cpu_widget]
widget = "cpu"
display_mode = "Gauge"
bar_orientation = "Horizontal"
show_value = true
show_icon = true
show_temperature = true
icon = "nf-md-cpu_64_bit"
value_format = "{cpu_usage:.0}%"
warning_threshold = 70.0
critical_threshold = 90.0

[memory_widget]
widget = "memory"
display_mode = "Gauge"
#display_mode = "Bar"
bar_orientation = "Vertical"
show_value = true
show_icon = true
show_used_bytes = true
show_available_bytes = false
icon = "nf-md-memory"
value_format = "{memory_usage:.0}%"
warning_threshold = 75.0
critical_threshold = 90.0

[battery_widget]
widget = "battery"
display_mode = "Gauge"
#display_mode = "Bar"
show_value = true
show_icon = true
show_status_text = true
icon = "nf-md-battery"
value_format = "{level:.0}%"
warning_threshold = 20.0
critical_threshold = 10.0

[disks_widget]
widget = "disks"
max_mount_points = 3
include_mount_points = ["/"]
show_throughput = true
#display_mode = "RootOnly"
display_mode = "Gauge"  # Shows a circular gauge for the first matching mount point
icon = "nf-md-harddisk"

[network_widget]
widget = "network"
display_mode = "Gauge"
show_received = true
show_transmitted = true
# Maximum bandwidth in bytes per second (50 Mbit down / 16 Mbit up)
max_download = 6250000
max_upload = 2000000
icon = "nf-md-network"


[uptime_widget]
widget = "uptime"
display_mode = "Gauge"
value_format = "{hours}:{minutes}h"
show_uptime = true
show_load_average_1_minute = false
show_load_average_5_minute = false
show_load_average_15_minute = false
icon = "nf-md-clock_start"


