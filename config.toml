# smearor-swipe-launcher Configuration

[launcher]
# Initial rotation in degrees (0, 90, 180, 270)
rotation = 23

# Services to load
services = [
    { id = "app_launcher_service", path = "target/debug/libapp_launcher_service.so" }
]

# Plugins in the left static area
[left_area]
plugins = [
    { id = "clock_widget_left", path = "target/debug/libclock_widget.so" }
]

# Plugins in the center scroll band
[scroll_band]
plugins = [
    { id = "clock_widget_date", path = "target/debug/libclock_widget.so" },
    { id = "clock_widget_time", path = "target/debug/libclock_widget.so" },
    { id = "firefox_nightly", path = "target/debug/libapp_launcher_widget.so" },
    { id = "clock_widget_1", path = "target/debug/libclock_widget.so" },
    { id = "clock_widget_2", path = "target/debug/libclock_widget.so" },
    { id = "clock_widget_3", path = "target/debug/libclock_widget.so" },
    { id = "clock_widget_4", path = "target/debug/libclock_widget.so" },
    { id = "clock_widget_5", path = "target/debug/libclock_widget.so" },
    { id = "clock_widget_6", path = "target/debug/libclock_widget.so" },
    { id = "clock_widget_7", path = "target/debug/libclock_widget.so" },
    { id = "clock_widget_8", path = "target/debug/libclock_widget.so" },
    { id = "clock_widget_9", path = "target/debug/libclock_widget.so" },
    { id = "clock_widget_10", path = "target/debug/libclock_widget.so" },
    { id = "clock_widget_11", path = "target/debug/libclock_widget.so" },
    { id = "clock_widget_12", path = "target/debug/libclock_widget.so" },
    { id = "clock_widget_13", path = "target/debug/libclock_widget.so" }
]

# Plugins in the right static area
[right_area]
plugins = [
    { id = "clock_widget_right", path = "target/debug/libclock_widget.so" }
]

# Plugin-specific configurations

[firefox_nightly]
desktop_file_path = "/usr/share/applications/firefox-nightly.desktop"

[clock_widget_left]
format = "[hour]:[minute]:[second]"
timezone = "UTC"

[clock_widget_date]
format = "[year]-[month]-[day]"
timezone = "UTC"

[clock_widget_time]
format = "[hour]:[minute]:[second]"
timezone = "UTC"

[clock_widget_1]
format = "[hour]:[minute]:[second]"
color = "#ff0000"

[clock_widget_4]
format = "[hour]:[minute]:[second]"
color = "#ff0000"

[clock_widget_7]
format = "[hour]:[minute]:[second]"
color = "#ff0000"

[clock_widget_10]
format = "[hour]:[minute]:[second]"
color = "#ff0000"

[clock_widget_13]
format = "[hour]:[minute]:[second]"
color = "#ff0000"

[clock_widget_right]
format = "[hour]:[minute]:[second]"
timezone = "UTC"
