# Shared background services for all launcher instances
# Loaded once by LauncherHost and shared across all windows

[[services]]
id = "app_launcher"
path = "target/release/libsmearor_app_launcher_service.so"

[[services]]
id = "audio"
path = "target/release/libsmearor_audio_service.so"

[[services]]
id = "mpris"
path = "target/release/libsmearor_mpris_service.so"

[[services]]
id = "notifications"
path = "target/release/libsmearor_notifications_service.so"

# Service-specific configurations
[app_launcher]
smearor_wrot_path = "smearor-wrot"
rotation = 0
