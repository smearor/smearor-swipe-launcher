# Shared background services for all launcher instances
# Loaded once by LauncherHost and shared across all windows

[[services]]
id = "app_launcher"
path = "target/release/libsmearor_app_launcher_service.so"

[[services]]
id = "audio"
path = "target/release/libsmearor_audio_service.so"

[[services]]
id = "mpris"
path = "target/release/libsmearor_mpris_service.so"

[[services]]
id = "notifications"
path = "target/release/libsmearor_notifications_service.so"

[[services]]
id = "hyprland"
path = "target/release/libsmearor_hyprland_service.so"

[[services]]
id = "sysinfo"
path = "target/release/libsmearor_sysinfo_service.so"
cpu_temperature_source = "hwmon"

[[services]]
id = "http"
path = "target/release/libsmearor_http_service.so"

[[services]]
id = "weather"
path = "target/release/libsmearor_weather_service.so"

[[services]]
id = "power"
path = "target/release/libsmearor_power_service.so"

[[services]]
id = "network"
path = "target/release/libsmearor_network_service.so"

[[services]]
id = "wayland"
path = "target/release/libsmearor_wayland_service.so"

[[services]]
id = "gnome"
path = "target/release/libsmearor_gnome_service.so"

[[services]]
id = "wallpaper"
path = "target/release/libsmearor_wallpaper_service.so"

[http]
allowed_urls = ["192.168.178.*", "https://api.open-meteo.com/*", "https://api.sunrise-sunset.org/*"]
default_timeout_ms = 10000
max_response_bytes = 1048576

# Service-specific configurations
[app_launcher]
smearor_wrot_path = "smearor-wrot"
rotation = 0

[sysinfo]
update_interval_ms = 5000
enable_cpu_temperature = true
# Supported sources: "thermal_zone" (default), "hwmon", or an absolute path like
# "/sys/class/hwmon/hwmon0/temp1_input".
# cpu_temperature_source = "hwmon"
enable_battery = true
enable_disks = true
enable_network = true

[weather]
latitude = 47.55
longitude = 9.70
update_interval_minutes = 30
enable_air_quality = true
timezone = "auto"
forecast_days = 2

[power]
countdown_seconds = 3
enable_inhibitor_detection = true
enable_scheduled_actions = true
refresh_interval_seconds = 30
# Hyprland:
#lock_command = "hyprlock"
#logout_command = "hyprctl dispatch exit"
# GNOME
lock_command = ""
logout_command = ""

[network]
refresh_interval_seconds = 5
enable_wifi_scan = true
enable_vpn_management = true
enable_throughput_monitoring = true
throughput_sample_interval_seconds = 2
public_ip_url = "https://api.ipify.org?format=json"

[wallpaper]
default_theme = "Smearor"
auto_start = false
config_path = "wallpaper.toml"
kill_grace_period_ms = 3000

[wayland]
enable_workspace_tracking = true

[gnome]
enable_workspace_tracking = true
poll_interval_ms = 500
