[workspace]
members = [
    "smearor-swipe-launcher",
    "smearor-plugin-api",
    "plugins/clock-widget",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["smearor"]

[workspace.dependencies]
abi_stable = "0.11"
adw = { package = "libadwaita", version = "0.9.1" }
clap = { version = "4.5", features = ["derive"] }
dashmap = "6.2.1"
gtk4 = "0.11"
glib = "0.21"
gtk4-layer-shell = "0.8"
libloading = "0.8"
miette = "7.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
smearor-wrot-rotation = { version = "0.1", git = "https://github.com/smearor/smearor-wrot-rotation.git" }
thiserror = "2.0"
tokio = { version = "1.42", features = ["full"] }
toml = "1.1.2+spec-1.1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
typed-builder = "0.23.2"
