[workspace]
members = [
    "smearor-swipe-launcher",
    "smearor-plugin-api",
    "plugins/clock-widget",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["smearor"]

[workspace.dependencies]
# Error handling
thiserror = "2.0"
miette = "7.4"

# GTK 4
gtk4 = "0.11"
glib = "0.21"
gtk4-layer-shell = "0.8"
adw = { package = "libadwaita", version = "0.9.1" }

# Async runtime
tokio = { version = "1.42", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# CLI
clap = { version = "4.5", features = ["derive"] }

# Dynamic loading
libloading = "0.8"

# FFI stability
abi_stable = "0.11"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

smearor-wrot-rotation = { version = "0.1", git = "https://github.com/smearor/smearor-wrot-rotation.git" }

typed-builder = "0.23.2"
